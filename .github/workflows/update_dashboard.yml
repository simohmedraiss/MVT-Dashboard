name: Update MVT Dashboard

on:
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas openpyxl

      - name: Download Excel + Transform
        env:
          SHAREPOINT_URL: ${{ secrets.SHAREPOINT_URL }}
        run: python scripts/download_and_transform.py

      - name: Commit and push data.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet || git commit -m "update: dashboard MVT $(date '+%Y-%m-%d %H:%M UTC')"
          git push
